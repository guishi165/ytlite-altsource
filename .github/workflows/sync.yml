name: Sync upstream releases

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch latest release info
        run: |
          curl -s https://api.github.com/repos/diarrhea3/YTLiteDiarrhea/releases/latest > release.json
          cat release.json

      - name: Extract values
        run: |
          TAG=$(jq -r '.tag_name' release.json)
          DATE=$(jq -r '.published_at' release.json)
          IPA=$(jq -r '.assets[] | select(.name | endswith(".ipa")) | .browser_download_url' release.json)

          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "IPA=$IPA" >> $GITHUB_ENV

      - name: Create AltStore source JSON
        run: |
          echo "{
            \"name\": \"YTLiteDiarrhea Mirror\",
            \"identifier\": \"com.guishi.ytlite\",
            \"apps\": [
              {
                \"name\": \"YTLiteDiarrhea\",
                \"bundleIdentifier\": \"com.google.ios.youtube\",
                \"developerName\": \"diarrhea3\",
                \"versions\": [
                  {
                    \"version\": \"${TAG}\",
                    \"date\": \"${DATE}\",
                    \"downloadURL\": \"${IPA}\",
                    \"localizedDescription\": \"Auto synced from GitHub releases\"
                  }
                ]
              }
            ]
          }" > altsource.json

      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add altsource.json
          git commit -m "Update source" || echo "No changes"
          git push
