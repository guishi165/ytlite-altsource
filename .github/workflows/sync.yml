name: Sync YTLiteDiarrhea Releases

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch latest release
        id: release
        run: |
          curl -s https://api.github.com/repos/diarrhea3/YTLiteDiarrhea/releases/latest > release.json
          
          TAG=$(jq -r .tag_name release.json)
          DATE=$(jq -r .published_at release.json)
          IPA_URL=$(jq -r '.assets[] | select(.name | endswith(".ipa")) | .browser_download_url' release.json)

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "ipa=$IPA_URL" >> $GITHUB_OUTPUT

      - name: Generate AltStore source
        run: |
          VERSION=${{ steps.release.outputs.tag }}
          DATE=${{ steps.release.outputs.date }}
          IPA=${{ steps.release.outputs.ipa }}

          cat > altsource.json <<EOF
          {
            "name": "YTLiteDiarrhea Mirror",
            "identifier": "com.yourname.ytlite",
            "apps": [
              {
                "name": "YTLiteDiarrhea",
                "bundleIdentifier": "com.google.ios.youtube",
                "developerName": "diarrhea3",
                "subtitle": "Auto mirrored from upstream releases",
                "iconURL": "https://raw.githubusercontent.com/${{ github.repository }}/main/icon.png",
                "versions": [
                  {
                    "version": "$VERSION",
                    "date": "$DATE",
                    "downloadURL": "$IPA",
                    "localizedDescription": "Automatically synced from GitHub releases."
                  }
                ]
              }
            ]
          }
          EOF

      - name: Commit if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add altsource.json
          git commit -m "Sync latest release" || echo "No changes"
          git push
